# Hive v0.2.0 — Rust rewrite hybrid deployment
# API (Axum) + Worker (Rust) + Web (still Node/TS until reimplementing)
# 
# Build the dev image with all toolchains:
#   docker build -f Dockerfile.dev -t beesroadhouse/hive-dev:latest .
#
# Run:
#   docker compose -f docker-compose.hybrid.yml up --build

services:
  hive-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["cargo", "run", "-p", "hive-api"]
    ports:
      - "7878:7878"
    volumes:
      - ./:/workspace
      - hive-data:/workspace/hive.db
      - cargo-cache:/usr/local/cargo/registry
    environment:
      - DATABASE_URL=sqlite:/workspace/hive.db
      - RUST_LOG=hive_api=debug,tower_http=debug
      - PORT=7878
    restart: unless-stopped
    networks:
      - hive

  hive-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["cargo", "run", "-p", "hive-worker"]
    volumes:
      - ./:/workspace
      - hive-data:/workspace/hive.db
      - cargo-cache:/usr/local/cargo/registry
      - model-cache:/workspace/models
    environment:
      - DATABASE_URL=sqlite:/workspace/hive.db
      - RUST_LOG=hive_worker=debug
      - HF_HOME=/workspace/models
    restart: unless-stopped
    networks:
      - hive
    depends_on:
      - hive-api

  # Web UI stays on the Node/TS stack for now
  hive-web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace/web
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    ports:
      - "8091:8091"
    volumes:
      - ./web:/workspace/web
      - node-modules:/workspace/web/node_modules
    environment:
      - HIVE_API_URL=http://hive-api:7878
    restart: unless-stopped
    networks:
      - hive
    depends_on:
      - hive-api

volumes:
  hive-data:
  cargo-cache:
  model-cache:
  node-modules:

networks:
  hive:
    driver: bridge
