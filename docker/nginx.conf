# hive-web — serve the Solid SPA and reverse-proxy the API to hive-api.
# Upstream is the compose service name `hive-api` on the internal network.
server {
    listen 8091;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE event stream — must beat the /api/ prefix match, so it's declared
    # first as an exact-ish prefix. No buffering; long read timeout so the
    # connection stays open.
    location = /api/stream {
        proxy_pass http://hive-api:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # MCP Streamable-HTTP transport — raw, unbuffered, long-lived.
    location /mcp {
        proxy_pass http://hive-api:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Everything else under /api/* (includes /api/healthz and /api/auth/oidc/*).
    location /api/ {
        proxy_pass http://hive-api:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth 2.1 AS surface (discovery, registration, token, authorize entry).
    # The SPA consent screen lives at /consent and falls through to index.html.
    location /.well-known/ { proxy_pass http://hive-api:7878; proxy_set_header Host $host; }
    location /oauth/       { proxy_pass http://hive-api:7878; proxy_set_header Host $host; }
    location = /authorize  { proxy_pass http://hive-api:7878; proxy_set_header Host $host; }

    # SPA fallback — client-side routing (includes /consent).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
