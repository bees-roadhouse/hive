# Local podman compose. Brings up postgres + hive-api on the same network.
# Postgres uses pgvector/pgvector:pg17 (postgres 17 + pgvector preinstalled).
#
# Bring up:    podman compose -f docker/docker-compose.local.yml up -d
# Logs:        podman compose -f docker/docker-compose.local.yml logs -f hive-api
# Tear down:   podman compose -f docker/docker-compose.local.yml down
#
# First boot: postgres initializes an empty hive db. Seed by running
# `hive-migrate` from the host with sqlite source + DATABASE_URL pointing
# at this postgres (default: postgres://hive:hive@localhost:5432/hive
# once you expose 5432, or run hive-migrate inside the postgres network).
# See docs/portainer-deploy.md for the canonical seed flow.
#
# hive-api builds from Containerfile.hive-api.local. No ghcr dependency.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    volumes:
      - "hive-data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive"]
      interval: 5s
      timeout: 3s
      retries: 5
    # local dev: expose 5432 to host so hive-migrate can seed from sqlite
    # without joining the container network. Drop this in the portainer stack.
    ports:
      - "127.0.0.1:5432:5432"

  hive-api:
    build:
      context: ..
      dockerfile: docker/Containerfile.hive-api.local
    image: hive-api:local
    container_name: hive-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hive:hive@postgres:5432/hive
      HIVE_API_BIND: 0.0.0.0:7878
      RUST_LOG: info,hive_api=debug
    ports:
      - "127.0.0.1:7878:7878"

  hive-wire-ingest:
    build:
      context: ..
      dockerfile: docker/Containerfile.hive-wire-ingest.local
    image: hive-wire-ingest:local
    container_name: hive-wire-ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hive:hive@postgres:5432/hive
      WIRE_INGEST_INTERVAL_SECS: 300
      RUST_LOG: info,hive_wire_ingest=info

volumes:
  hive-data:
    name: hive-data
