# Canonical Portainer stack for hive. Pulls hive-api from ghcr.io and
# runs postgres (pgvector/pgvector:pg17) alongside it. API serves :7878
# for laptop / desktop / iPad clients on the LAN.
#
# Deploy: see docs/portainer-deploy.md. tl;dr ... let the stack come up
# with an empty postgres volume, then run `hive-migrate` once from the
# laptop pointing at this DATABASE_URL to seed from the legacy sqlite.
#
# Local dev (laptop, builds from source) lives in docker-compose.local.yml
# ... don't mix the two.
#
# Prod hint: POSTGRES_PASSWORD below is the dev default. For Portainer,
# define a stack-level secret or environment override (the Portainer
# "Environment variables" UI) and reference it as ${POSTGRES_PASSWORD}.
# Do NOT commit a real password here.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hive
      # Override via Portainer stack env. The literal below is a
      # local-dev default; production must inject a secret.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
      POSTGRES_DB: hive
    volumes:
      - hive-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  hive-api:
    image: ghcr.io/bees-roadhouse/hive-api:latest
    container_name: hive-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hive:${POSTGRES_PASSWORD:-hive}@postgres:5432/hive
      HIVE_API_BIND: 0.0.0.0:7878
      RUST_LOG: info
    ports:
      # Expose on the host for direct LAN access. If routing through
      # Traefik/Caddy on the `edge` network, drop this and rely on the
      # proxy.
      - "7878:7878"
    healthcheck:
      # /healthz returns {"ok": true} when the API is up and postgres is
      # reachable. wget is present in debian-slim; no curl in the runtime
      # image by design.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7878/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - default
      - edge
    labels:
      # Generic discovery hint ... readable by humans and any reverse
      # proxy that reads docker labels.
      br.hive.role: "api"
      br.hive.port: "7878"
      br.hive.endpoint: "canonical"
      # Traefik v2/v3 labels. Uncomment + set the host rule if Nate is
      # routing hive-api through Traefik on the `edge` network.
      #
      # traefik.enable: "true"
      # traefik.docker.network: "edge"
      # traefik.http.routers.hive-api.rule: "Host(`hive.roadhouse.lan`)"
      # traefik.http.routers.hive-api.entrypoints: "websecure"
      # traefik.http.routers.hive-api.tls: "true"
      # traefik.http.services.hive-api.loadbalancer.server.port: "7878"
      # traefik.http.services.hive-api.loadbalancer.healthcheck.path: "/healthz"

volumes:
  hive-data:
    # Named volume backs postgres /var/lib/postgresql/data. Portainer
    # manages the lifecycle; the actual data lives at
    # /var/lib/docker/volumes/<stack>_hive-data/_data on the host.
    # Back this up via pg_dump (see docs/portainer-deploy.md), NOT a
    # cp of the raw data dir.
    name: hive-data

networks:
  default:
    # Internal-only network. postgres is reachable as `postgres:5432`
    # only from services on this network ... not exposed to the host.
    name: hive-internal
  edge:
    # External network for reverse-proxy integration. Create once on the
    # host with `docker network create edge` (or reuse the existing
    # name if Traefik/Caddy is already wired). Marked external so
    # Portainer won't try to recreate or delete it.
    external: true
    name: edge
