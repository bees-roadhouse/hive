[workspace]
resolver = "2"
members = [
    "crates/hive-db",
    "crates/hive-cli",
    "crates/hive-api",
    "crates/hive-ui",
    "crates/hive-embed",
    "crates/hive-core",
    "crates/hive-desktop",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/bees-roadhouse/hive"
authors = ["Bee's Roadhouse <nate.smith@beesroadhouse.com>"]

[workspace.dependencies]
# Workspace crates
hive-db = { path = "crates/hive-db" }
hive-embed = { path = "crates/hive-embed" }
hive-core = { path = "crates/hive-core" }

# Sqlite (bundled with FTS5)
rusqlite = { version = "0.32", features = ["bundled-full", "serde_json", "chrono", "blob"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"

# Async runtime (api + ui only)
tokio = { version = "1", features = ["full"] }

# Web framework (api + ui)
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client (embed)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Date/time
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }

# Errors
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Path resolution (cross-platform ~/.hive)
directories = "5"

# Utilities
hex = "0.4"
sha2 = "0.10"

# UI templating (maud: type-safe HTML, no leptos WASM toolchain in v1)
maud = { version = "0.27", features = ["axum"] }

# Slint native desktop UI (hive-desktop crate; GPLv3-linked)
slint = "1.16"
slint-build = "1.16"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
