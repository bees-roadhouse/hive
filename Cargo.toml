[workspace]
resolver = "2"
members = [
    "crates/hive-db",
    "crates/hive-api",
    "crates/hive-cli",
    "crates/hive-embed",
    "crates/hive-core",
    "crates/hive-md",
    "crates/hive-ui",
    "crates/hive-wire-ingest",
]

# Deferred (still on rusqlite sync API; retired by the api-first shift):
#   "crates/hive-migrate" ... one-shot sqlite -> postgres copy. Job done; the
#     canonical hive.db has been on postgres since f82f05f. Migration 0002
#     handles the uuid-pk flip purely in SQL, so the rust-side helper this
#     crate scaffolds is no longer on the critical path. Left in-tree for now
#     in case a future re-import from a sqlite snapshot wants to reuse the
#     decoders; will need a uuid backfill pass when revived.
exclude = [
    "crates/hive-migrate",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/bees-roadhouse/hive"
authors = ["Bee's Roadhouse <nate.smith@beesroadhouse.com>"]

[workspace.dependencies]
# Workspace crates
hive-db = { path = "crates/hive-db" }
hive-embed = { path = "crates/hive-embed" }
hive-core = { path = "crates/hive-core" }
hive-md = { path = "crates/hive-md" }

# Sqlite (legacy: only the excluded hive-migrate crate's sqlite->postgres
# read path uses these now; hive-cli is an HTTP client and no longer touches sqlite)
rusqlite = { version = "0.32", features = ["bundled-full", "serde_json", "chrono", "blob"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"

# Postgres (hive-db + hive-api)
sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
    "macros",
    "chrono",
    "json",
    "uuid",
    "migrate",
] }
pgvector = { version = "0.4", features = ["sqlx"] }

# Async runtime (api + ui only)
tokio = { version = "1", features = ["full"] }

# Web framework (api + ui)
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client (embed)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Date/time
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }

# Errors
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Path resolution (cross-platform ~/.hive)
directories = "5"

# Utilities
hex = "0.4"
sha2 = "0.10"
uuid = { version = "1", features = ["v7", "serde"] }

# Auth (hive-api: JWT verification + Ed25519 keygen for the local AS).
# jsonwebtoken 10 requires an explicit crypto provider; pick `rust_crypto`
# (pure-Rust, no OpenSSL/aws-lc build) to match the workspace's rustls choice.
jsonwebtoken = { version = "10", default-features = false, features = ["rust_crypto"] }
ring = "0.17"      # Ed25519 PKCS#8 keypair generation; already in-tree via rustls
base64 = "0.22"    # base64url for JWK public-key encoding
argon2 = "0.5"     # argon2id password hashing (AS core, Phase 2)
rand = "0.8"       # CSPRNG for opaque refresh tokens + salts
# Auth Phase 4 (TOTP MFA, RFC 6238). TOTP is computed directly on hmac+sha1
# (both already transitive deps) instead of pulling the heavier totp-rs/QR tree;
# chacha20poly1305 encrypts the TOTP secret at rest (§4); base32 encodes the
# secret for the otpauth:// provisioning URI.
hmac = "0.12"
sha1 = "0.10"
base32 = "0.5"
chacha20poly1305 = "0.10"

# Embedding + reranking (hive-embed)
fastembed = "5"

# Markdown parsing (hive-md: Obsidian task grammar for journal-canvas dual-write)
pulldown-cmark = "0.12"

# RSS polling (hive-wire-ingest)
rss = "2.0"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
