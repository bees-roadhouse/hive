name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag (e.g. v0.1.0 or test-2026-05-15)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bees-roadhouse

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build hive + hive-api + hive-ui
        # `bundled-full` compiles sqlite (with FTS5) from source. zigbuild
        # supplies a cross-linker that uses zig as a C compiler, which
        # produces glibc-targeted arm64 binaries at native cargo speed.
        run: |
          cargo zigbuild \
            --release \
            --target ${{ matrix.target }} \
            -p hive-cli -p hive-api -p hive-ui

      - name: Stage artifacts
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/hive       artifacts/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/hive-api   artifacts/${{ matrix.arch }}/
          cp target/${{ matrix.target }}/release/hive-ui    artifacts/${{ matrix.arch }}/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/*
          if-no-files-found: error
          retention-days: 7

  image:
    name: image (${{ matrix.bin }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        bin: [hive-api, hive-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin-amd64
          path: artifacts/amd64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin-arm64
          path: artifacts/arm64

      - name: Make binaries executable
        run: chmod +x artifacts/amd64/* artifacts/arm64/* || true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for cross-arch image build)
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.bin }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.bin }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.bin }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.bin }}:latest
          build-args: |
            BINARY_DIR=artifacts

  cli-release:
    name: hive CLI binary release artifact
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin-amd64
          path: artifacts/amd64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin-arm64
          path: artifacts/arm64

      - name: Tarball CLIs
        run: |
          mkdir release
          tar -czf release/hive-${GITHUB_REF#refs/tags/}-linux-amd64.tar.gz -C artifacts/amd64 hive
          tar -czf release/hive-${GITHUB_REF#refs/tags/}-linux-arm64.tar.gz -C artifacts/arm64 hive

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
