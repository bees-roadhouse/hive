name: Build Hermes Dev Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths: [Dockerfile.dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hermes-dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "extra=latest stable" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
            echo "extra=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (arm64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=hermes-dev
          cache-to: type=gha,mode=max,scope=hermes-dev

      - name: Push extra tags (release only)
        if: steps.meta.outputs.extra != ''
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SRC="${IMG}:${{ steps.meta.outputs.tag }}"
          for extra in ${{ steps.meta.outputs.extra }}; do
            docker buildx imagetools create --tag "${IMG}:${extra}" "$SRC"
          done
