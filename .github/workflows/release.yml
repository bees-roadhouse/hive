name: Build and Release

# PR-driven image builds with retag-on-merge, per the BR DevOps standard
# (Docker Image Build Workflows). Three images — hive-api, hive-web,
# hive-worker — build in parallel on PR, get the immutable sha-{full-sha} tag,
# and are retagged (never rebuilt) on merge: `dev` for development, and
# `{version}` + `release` + `latest` for release.

on:
  pull_request:
    branches: [development, release]
    types: [opened, synchronize, reopened, closed]
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  # ===== build (PR open/synchronize/reopen) =====
  build:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # `rust` builds the all-in-one Axum image (docker/Dockerfile.rust):
        # one binary serves the API + the SPA, plus the worker. The Node
        # images (api/web/worker) keep publishing until the Rust stack is
        # proven in prod — additive, not a swap.
        image: [api, web, worker, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hive-${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}:sha-${{ github.event.pull_request.head.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ===== promote (PR closed && merged) =====
  # Retags the existing sha-{full-sha} manifest as the stream tag. No rebuild.
  promote:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web, worker, rust]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag for development merges
        if: steps.vars.outputs.base_ref == 'development'
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}"
          SRC="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create --tag "${IMG}:dev" "$SRC"

      - name: Retag for release merges
        if: steps.vars.outputs.base_ref == 'release'
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}"
          SRC="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create \
            --tag "${IMG}:${{ steps.vars.outputs.version }}" \
            --tag "${IMG}:release" \
            --tag "${IMG}:latest" \
            "$SRC"

  # ===== github-release-on-merge (PR merge to release) =====
  github-release-on-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release'
    needs: [promote]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version + tag
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            NEEDS_TAG=false
          else
            NEEDS_TAG=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=${NEEDS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.vars.outputs.needs_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release ${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.vars.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: hive ${{ steps.vars.outputs.tag }}
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            # All-in-one Rust stack (API + SPA + worker from one image):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-rust:${{ steps.vars.outputs.version }}

            # Node stack (api + web + worker):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-api:${{ steps.vars.outputs.version }}
            podman pull ghcr.io/${{ github.repository_owner }}/hive-web:${{ steps.vars.outputs.version }}
            podman pull ghcr.io/${{ github.repository_owner }}/hive-worker:${{ steps.vars.outputs.version }}
            ```
