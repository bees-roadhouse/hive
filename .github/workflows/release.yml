name: Build and Release

# PR-driven image builds with retag-on-merge, per the BR DevOps standard
# (Docker Image Build Workflows), adapted to the single-main branch model.
# Images — hive-rust (all-in-one API+SPA+worker), hive-runner, hive-reflector,
# and hive-session-dev — build on PR with the immutable sha-{head-sha} tag and
# are retagged (never rebuilt) on merge to `dev` plus a sha-{merge-sha} alias.
# Releases are tag-driven: pushing v{version} retags the merge commit's images
# as `{version}` + `latest` and cuts the GitHub Release.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  # ===== build: hive-runner + hive-reflector (PR open/synchronize/reopen) =====
  # JS isn't compiled, so multi-arch via QEMU is effectively free here.
  # (The legacy Node-stack images — api, web, worker — stopped publishing in
  # 0.6.0; the Rust image below is the deployed stack.)
  build:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [runner, reflector]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hive-${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}:sha-${{ github.event.pull_request.head.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ===== build: hive-session-dev (full hosted-session toolbox) =====
  # This image is large and targets The Roadhouse's arm64 hosts. Build it on a
  # native arm runner instead of QEMU multi-arch emulation.
  build-session-dev:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hive-session-dev
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.session-dev
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-session-dev:sha-${{ github.event.pull_request.head.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=session-dev-arm64
          cache-to: type=gha,mode=max,scope=session-dev-arm64

  # ===== build: hive-rust (all-in-one Axum image) =====
  # Rust + onnxruntime is a real compile, so QEMU arm64 emulation is
  # pathological (multi-hour). Build each arch on its OWN native runner
  # (free for public repos), push by digest, then assemble the multi-arch
  # manifest in build-rust-manifest. The Node images keep publishing — the
  # Rust stack is additive until it's proven in prod.
  build-rust:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.rust
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-rust,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=rust-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rust-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rust-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Assemble the per-arch digests into one sha-<sha> manifest list.
  build-rust-manifest:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: rust-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-rust"
          TAG="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create --tag "$TAG" \
            $(for d in /tmp/digests/*; do echo "${IMG}@$(cat "$d")"; done)
          docker buildx imagetools inspect "$TAG"

  # ===== promote (PR closed && merged) =====
  # Retags the existing sha-{head-sha} manifest — no rebuild — as:
  #   dev                    the rolling main stream
  #   sha-{merge-sha}        alias so a later `git tag vX.Y.Z` (which points at
  #                          the merge commit, not the PR head) can find the
  #                          exact image without rebuilding. Load-bearing:
  #                          squash/merge commits have different SHAs than PR
  #                          heads, and release-on-tag looks up by merge sha.
  promote:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [rust, runner, reflector, session-dev]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag merge as dev + merge-sha alias
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}"
          SRC="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create \
            --tag "${IMG}:dev" \
            --tag "${IMG}:sha-${{ github.event.pull_request.merge_commit_sha }}" \
            "$SRC"

  # ===== release-on-tag (push of v{version}) =====
  # The release act is deliberate and manual: bump versions in the release PR,
  # merge it, then `git tag v{version} <merge-sha> && git push origin v{version}`.
  # This job retags that merge commit's images (built and aliased by promote)
  # and cuts the GitHub Release. It never rebuilds: if the sha manifest is
  # missing, tag a commit that merged through a PR instead.
  release-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r '.version' package.json)
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package.json version ${PKG_VERSION} — bump versions before tagging"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag {version} + latest from the merge-sha manifests
        run: |
          for image in rust runner reflector session-dev; do
            IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${image}"
            SRC="${IMG}:sha-${{ github.sha }}"
            if ! docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
              echo "::error::${SRC} not found — tag a commit that merged through a PR (promote creates the sha alias); never rebuild at release time"
              exit 1
            fi
            docker buildx imagetools create \
              --tag "${IMG}:${{ steps.vars.outputs.version }}" \
              --tag "${IMG}:latest" \
              "$SRC"
          done

      - uses: pnpm/action-setup@v4
        if: hashFiles('scripts/build-mcpb.sh') != ''
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        if: hashFiles('scripts/build-mcpb.sh') != ''
        with:
          node-version: 22

      - name: Build Claude Desktop bundle (hive.mcpb)
        if: hashFiles('scripts/build-mcpb.sh') != ''
        run: ./scripts/build-mcpb.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: hive v${{ steps.vars.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/hive.mcpb
          fail_on_unmatched_files: false
          body: |
            ## Container images

            ```
            # All-in-one Rust stack (API + SPA + worker from one image):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-rust:${{ steps.vars.outputs.version }}

            # Hosted-session runner + full dev toolbox:
            podman pull ghcr.io/${{ github.repository_owner }}/hive-runner:${{ steps.vars.outputs.version }}
            podman pull ghcr.io/${{ github.repository_owner }}/hive-session-dev:${{ steps.vars.outputs.version }}

            # Reflection loop (compose `reflector` profile):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-reflector:${{ steps.vars.outputs.version }}
            ```
