name: Build and Release

# PR-driven image builds with retag-on-merge, per the BR DevOps standard
# (Docker Image Build Workflows). Three images — hive-api, hive-web,
# hive-worker — build in parallel on PR, get the immutable sha-{full-sha} tag,
# and are retagged (never rebuilt) on merge: `dev` for development, and
# `{version}` + `release` + `latest` for release.

on:
  pull_request:
    branches: [development, release]
    types: [opened, synchronize, reopened, closed]
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  # ===== build: Node images (PR open/synchronize/reopen) =====
  # JS isn't compiled, so multi-arch via QEMU is effectively free here.
  build:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [api, web, worker, runner]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hive-${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}:sha-${{ github.event.pull_request.head.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ===== build: hive-rust (all-in-one Axum image) =====
  # Rust + onnxruntime is a real compile, so QEMU arm64 emulation is
  # pathological (multi-hour). Build each arch on its OWN native runner
  # (free for public repos), push by digest, then assemble the multi-arch
  # manifest in build-rust-manifest. The Node images keep publishing — the
  # Rust stack is additive until it's proven in prod.
  build-rust:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.rust
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-rust,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=rust-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rust-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rust-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Assemble the per-arch digests into one sha-<sha> manifest list.
  build-rust-manifest:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: rust-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-rust"
          TAG="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create --tag "$TAG" \
            $(for d in /tmp/digests/*; do echo "${IMG}@$(cat "$d")"; done)
          docker buildx imagetools inspect "$TAG"

  # ===== promote (PR closed && merged) =====
  # Retags the existing sha-{full-sha} manifest as the stream tag. No rebuild.
  promote:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web, worker, rust, runner]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag for development merges
        if: steps.vars.outputs.base_ref == 'development'
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}"
          SRC="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create --tag "${IMG}:dev" "$SRC"

      - name: Retag for release merges
        if: steps.vars.outputs.base_ref == 'release'
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/hive-${{ matrix.image }}"
          SRC="${IMG}:sha-${{ github.event.pull_request.head.sha }}"
          docker buildx imagetools create \
            --tag "${IMG}:${{ steps.vars.outputs.version }}" \
            --tag "${IMG}:release" \
            --tag "${IMG}:latest" \
            "$SRC"

  # ===== github-release-on-merge (PR merge to release) =====
  github-release-on-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release'
    needs: [promote]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version + tag
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            NEEDS_TAG=false
          else
            NEEDS_TAG=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=${NEEDS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.vars.outputs.needs_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release ${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.vars.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: hive ${{ steps.vars.outputs.tag }}
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            # All-in-one Rust stack (API + SPA + worker from one image):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-rust:${{ steps.vars.outputs.version }}

            # Node stack (api + web + worker):
            podman pull ghcr.io/${{ github.repository_owner }}/hive-api:${{ steps.vars.outputs.version }}
            podman pull ghcr.io/${{ github.repository_owner }}/hive-web:${{ steps.vars.outputs.version }}
            podman pull ghcr.io/${{ github.repository_owner }}/hive-worker:${{ steps.vars.outputs.version }}
            ```
