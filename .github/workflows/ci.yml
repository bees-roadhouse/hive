name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual escape hatch: lets CI run when GitHub webhook delivery drops the
  # pull_request/push event (dispatches go straight to Actions, not via hooks).
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    # No database service: the store is op-log + SQLite since the PR 1.6
    # cutover — every test runs against tempdir data dirs. PR 1.7 re-adds a
    # Postgres service scoped to the importer's own tests (the importer is
    # the one remaining Postgres reader).
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake \
            libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      # Matches rust-toolchain.toml so local fmt/clippy and CI agree.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: hive-rust

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo build
        run: cargo build --workspace --all-targets

      - name: Cargo test
        # Belt and braces: hive-core injects the hash embedder in tests, but
        # hive-embed's own default (no HIVE_EMBED) is the transformers
        # provider, whose lazy ONNX engine would try to download BGE models
        # from the HF hub on a stray first embed. Pin CI offline + fast.
        env:
          HIVE_EMBED: hash
        run: cargo test --workspace
