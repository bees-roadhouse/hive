name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual escape hatch: lets CI run when GitHub webhook delivery drops the
  # pull_request/push event (dispatches go straight to Actions, not via hooks).
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build (shared, web, cli, agent)
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    # The store layer is Postgres now; the test suite runs each test in an
    # isolated schema against this service (DATABASE_URL below).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: hive
          POSTGRES_PASSWORD: hive
          POSTGRES_DB: hive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hive -d hive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hive:hive@localhost:5432/hive
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsqlite3-dev cmake

      # Matches rust-toolchain.toml so local fmt/clippy and CI agree.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: hive-rust

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo build
        run: cargo build --workspace --all-targets

      - name: Cargo test
        # Hash embedder keeps CI offline + fast (the transformers provider would
        # try to download BGE models from the HF hub on first embed).
        env:
          HIVE_EMBED: hash
        run: cargo test --workspace
