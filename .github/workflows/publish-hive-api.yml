# publish-hive-api: builds and pushes hive-api to ghcr on every development
# push and on hive-api-v* tags. multi-arch (amd64 + arm64) via cargo-zigbuild
# + docker buildx (matches the pattern in publish.yml).
#
# pulls:
#   docker pull ghcr.io/bees-roadhouse/hive-api:latest        # development HEAD
#   docker pull ghcr.io/bees-roadhouse/hive-api:sha-abc1234   # pinned to commit
#   docker pull ghcr.io/bees-roadhouse/hive-api:hive-api-v0.1.0  # release tag
#
# portainer: point the stack image: at one of the tags above. for prod, prefer
# the version tag; for dev, latest or sha- pins.

name: publish-hive-api

on:
  push:
    branches: [development]
    tags: ['hive-api-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag override (default: branch / git tag)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bees-roadhouse/hive-api

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: hive-api-${{ matrix.target }}

      - name: Build hive-api
        # bundled-full compiles sqlite (with FTS5) from source. zigbuild
        # supplies a cross-linker that uses zig as a C compiler for glibc
        # arm64 at native cargo speed.
        run: |
          cargo zigbuild \
            --release \
            --target ${{ matrix.target }} \
            -p hive-api

      - name: Stage artifact
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/hive-api artifacts/${{ matrix.arch }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hive-api-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/hive-api
          if-no-files-found: error
          retention-days: 7

  image:
    name: image (multi-arch push)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        # builds the tag list as multiline output. always includes sha-<short>.
        # adds the explicit ref tag (git tag name, or workflow_dispatch input).
        # adds :latest only on the default branch push.
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          tag_list="${{ env.IMAGE }}:sha-${short_sha}"

          if [ -n "${{ inputs.tag }}" ]; then
            tag_list="${tag_list}
          ${{ env.IMAGE }}:${{ inputs.tag }}"
          fi

          case "$GITHUB_REF" in
            refs/tags/*)
              ref_tag="${GITHUB_REF#refs/tags/}"
              tag_list="${tag_list}
          ${{ env.IMAGE }}:${ref_tag}"
              ;;
            refs/heads/development)
              tag_list="${tag_list}
          ${{ env.IMAGE }}:latest
          ${{ env.IMAGE }}:development"
              ;;
          esac

          {
            echo "list<<EOF"
            echo "$tag_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hive-api-amd64
          path: artifacts/amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hive-api-arm64
          path: artifacts/arm64

      - name: Make binaries executable
        run: chmod +x artifacts/amd64/hive-api artifacts/arm64/hive-api

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.hive-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          build-args: |
            BINARY_DIR=artifacts
          labels: |
            org.opencontainers.image.source=https://github.com/bees-roadhouse/hive
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=hive-api
